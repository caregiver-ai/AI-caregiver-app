name: Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - "scripts/apply-supabase-migrations.sh"
      - ".github/workflows/supabase-migrations.yml"
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip When Database URL Is Missing
        if: env.SUPABASE_DB_URL == ''
        run: echo "SUPABASE_DB_URL is not configured. Skipping migrations."

      - name: Install PostgreSQL Client
        if: env.SUPABASE_DB_URL != ''
        run: sudo apt-get update && sudo apt-get install --yes postgresql-client

      - name: Apply Pending Migrations
        if: env.SUPABASE_DB_URL != ''
        run: ./scripts/apply-supabase-migrations.sh
